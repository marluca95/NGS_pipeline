# Paired-Chain Pipeline — Step 01: Preprocessing config
# Project: P3620_LUCA-TCRDMF5-abDMS
# BBDuk paired-end quality trimming

bbmap_dir: "/cluster/project/reddy/marluca/NGS_pipeline/bbmap"

sample_sheet: "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/P3620_LUCA-TCRDMF5-abDMS_samples.tsv"

output_dir: "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/01_preprocessed"
logs_dir:   "/cluster/project/reddy/marluca/NGS_pipeline/logs/P3620_LUCA-TCRDMF5-abDMS/01_preprocessed"

run_label: "P3620_LUCA-TCRDMF5-abDMS"

# Trimming parameters
# min_length=100: required to cover UMI(12)+spacer(7)+anchor_beta(20)+CDR3_beta(33)=72 nt;
# 100 nt is the minimum to fully cover the CDR3 region of interest.
# this will not cover reads with a spacer of 7nt. NGS readlength was 1nt shorter than expected, so we set min_length to 100 instead of 101.
qtrim: "r"
quality_threshold: 20
min_length: 100
bbduk_xmx_gb: 64
