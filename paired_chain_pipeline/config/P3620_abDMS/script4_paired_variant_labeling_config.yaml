# Paired-Chain Pipeline — Step 04: Paired Variant Labeling config
# Project: P3620_LUCA-TCRDMF5-abDMS
#
# Conditions (inferred from sample names in P3620):
#   originallibrary  → library baseline
#   GIG*minus / DRG*minus  → negative selection conditions
#   GIG*plus  / DRG*plus   → positive selection conditions
#
# Adjust lib_suffix, neg_suffix, pos3x_suffix to match your actual condition naming.
# The suffixes are matched against the token extracted from the FASTQ sample name
# (everything after the first underscore in the filtered TSV filename stem).

input_dir:  "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/03_extraction"
output_dir: "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/04_variant_labeling"
logs_dir:   "/cluster/project/reddy/marluca/NGS_pipeline/logs/P3620_LUCA-TCRDMF5-abDMS/04_variant_labeling"

run_label: "P3620_LUCA-TCRDMF5-abDMS"

# Input glob for paired TSV files (output of script3)
input_glob: "*.filtered.PASS.paired.tsv"

# Column names in the paired TSV
beta_aa_column:  "beta_aa"
alpha_aa_column: "alpha_aa"

# Condition suffix patterns — match the sample_name part of the filename
lib_suffix:   "originallibrary"
neg_suffix:   "minus"           # matches GIG01minus, DRG01minus, etc.
pos3x_suffix: "plus"            # matches GIG01plus,  DRG01plus,  etc.
pos1x_suffix: "__unused__"      # set to a non-matching string if only one pos condition

# Token prefix to strip before suffix matching (leave empty if not applicable)
file_token_prefix: ""

# Conditions that must be present for a peptide group to be processed
required_conditions:
  - neg
  - pos3x

# Enrichment parameters
pseudocount: 1.0e-9
status_up:   2.0    # enrichment ratio >= 2.0 → Enriched
status_down: 0.5    # enrichment ratio <= 0.5 → Depleted
