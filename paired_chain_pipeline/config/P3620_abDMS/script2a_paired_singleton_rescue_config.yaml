# Paired-Chain Pipeline — Step 02a: Paired Singleton Rescue config
# Project: P3620_LUCA-TCRDMF5-abDMS

samples_tsv: "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/P3620_LUCA-TCRDMF5-abDMS_samples.tsv"

singleton_dir: "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/02_umi_consensus"
output_dir:    "/cluster/project/reddy/marluca/NGS_pipeline/data/P3620_LUCA-TCRDMF5-abDMS/02_umi_consensus"
logs_dir:      "/cluster/project/reddy/marluca/NGS_pipeline/logs/P3620_LUCA-TCRDMF5-abDMS/02a_singleton_rescue"

run_label: "P3620_LUCA-TCRDMF5-abDMS"

# Input singleton suffixes (output of script2)
singleton_suffix_beta:  "_singletons_beta.fastq.gz"
singleton_suffix_alpha: "_singletons_alpha.fastq.gz"

# AA-extraction anchors (same as script3) for variant region identification
# These are used to locate the variable CDR3 region within the singleton read
anchor_beta:  "TCTGGTGCCTTGTCCAAA"    # beta AA-extraction anchor (fully present in insert)
anchor_alpha: "CTACCTCTGT"            # trailing 10 nt of alpha AA anchor (first 8 nt overlap with UMI anchor)

# Variable region lengths
var_len_beta:  33   # 11 codons
var_len_alpha: 30   # 10 codons

# A (beta_var, alpha_var) pair must appear in at least this many distinct UMI pairs
# to be rescued
min_umis: 3
