# Paths where trimmed + combined FASTQs live (input for UMI/consensus steps)
input_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3/01_preprocessed/10_05_2026_minLenght191_QScore30"
sample_sheet: "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3/P3408_LUCA-TCRA3_samples.tsv"
output_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3/02_umi/14_05_2026_FULLRUN"
logs_dir: "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3/14_05_2026_FULLRUN/"

# UMI extraction / matching
umi_length: 12
anchor_sequence: "ACATGACGTCTCCCTCAGTC" #In or case:binding region of primer
max_mismatches: 1

# Consensus calling defaults
min_reads_per_umi: 2

# Suffix produced by the previous step (trim + combine)
combined_suffix: "_combined_trimmed.fastq.gz"


# Library layout: allowed spacer range (default: 0–3)
spacer_min: 0
spacer_max: 3

# Posterior consensus threshold (default: 2.0)
posterior_min_log_delta: 2.0

# Placeholder quality character for consensus FASTQ (default: "I")
consensus_placeholder_qual_char: "I"