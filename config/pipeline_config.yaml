# =============================================================================
# NGS Pipeline — Unified Project Configuration
# =============================================================================
#
# PURPOSE
# -------
# This file is the single source of truth for all pipeline parameters.
# It documents every setting in one place, organised by pipeline step.
#
# HOW TO USE
# ----------
# This file is a reference/template. Actual pipeline runs use the numbered
# per-script configs (00_sample_table.yaml … 04_variant_labeling.yaml),
# which are derived from the values here. To set up a new project:
#
#   1. Copy this file and the 00_*.yaml … 04_*.yaml configs.
#   2. Update project.name, all paths, and any biology-specific parameters.
#   3. Run step 00 to generate the sample sheet TSV, then run steps 01-04.
#
# NAMING CONVENTIONS
# ------------------
# Output directories are numbered to reflect pipeline order:
#   data/{project_name}/00_sample_table/
#   data/{project_name}/01_preprocessed/
#   data/{project_name}/02_umi_consensus/
#   data/{project_name}/03_extracted/
#   data/{project_name}/04_variant_labeling/
#
# Log directories mirror this structure under logs/:
#   logs/{project_name}/00_sample_table/
#   logs/{project_name}/01_preprocessing/
#   logs/{project_name}/02_umi_consensus/
#   logs/{project_name}/02a_singleton_rescue/
#   logs/{project_name}/03_extraction/
#   logs/{project_name}/04_variant_labeling/
#
# Log filenames (generated automatically by logging_utils.py):
#   {script_name}__{scope}__{run_label}__{YYYYMMDD_HHMMSS}.log
#
# =============================================================================


# ---- Project identity -------------------------------------------------------
project:
  name: "P3408_LUCA-TCRA3"
  run_label: "03_04_2026"               # used in log file names


# ---- Root directories -------------------------------------------------------
paths:
  project_root:  "/cluster/project/reddy/katja/NGS_pipeline"
  data_root:     "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3/POOL-1196-naivelibs"
  logs_root:     "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK"


# ---- Shared inputs ----------------------------------------------------------
shared:
  # Sample sheet (TSV) generated by step 00 and used by scripts 1, 2, 2a.
  # Script 3 and onwards use the same file, but the key is called 'samples_tsv'.
  sample_sheet:  "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/P3408_LUCA-TCRA3-3xNNK_samples.tsv"

  # External tool — BBMap suite (only needed by step 01)
  bbmap_dir:     "/cluster/project/reddy/marluca/NGS_pipeline/bbmap"


# =============================================================================
# Step 00 — Sample sheet generation (script0_generate_sample_table.py)
# =============================================================================
#
# Input:  raw FASTQ directory tree
# Output: sample sheet TSV used by downstream steps
#
# Output file:
#   {project_name}_samples.tsv with columns:
#   sample_id, sample_name, run_depth, lane, read, fastq
#
step00_sample_table:
  # Root directory to traverse for *.fastq.gz files.
  # Expected filename pattern:
  #   {sample_id}_{...}_{sample_name}_S{...}_L{lane}_R{read}_{...}.fastq.gz
  raw_fastq_root: "/cluster/project/reddy/katja/data/raw/P3408_LUCA-TCRA3"

  # Output sample sheet TSV. This should match shared.sample_sheet.
  output_tsv:     "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/P3408_LUCA-TCRA3-3xNNK_samples.tsv"

  # Directory for step-00 log files.
  logs_dir:       "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK/00_sample_table"


# =============================================================================
# Step 01 — Quality trimming (script1_preprocessing.py)
# =============================================================================
#
# Input:  raw FASTQ files listed in sample_sheet
# Output: per-sample trimmed & combined FASTQs
#
# Output files per sample (in 01_preprocessed/{sample_id}_{sample_name}/):
#   {sample_id}_{sample_name}.trimmed.fastq.gz         — individual lane FASTQs
#   {sample_id}_{sample_name}_combined_trimmed.fastq.gz — all lanes merged
#   {sample_id}_{sample_name}.bbduk_summary.csv         — per-sample BBDuk stats
# Run-level output (in 01_preprocessed/):
#   bbduk_run_summary.csv                               — all samples combined
#
step01_preprocessing:
  output_dir:  "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/01_preprocessed"
  logs_dir:    "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK/01_preprocessed"

  # BBDuk quality trimming parameters
  qtrim:             "r"     # trim from the right end
  quality_threshold: 20      # Phred quality cutoff
  min_length:        191     # discard reads shorter than this after trimming
  bbduk_xmx_gb:     64      # Java heap size in GB


# =============================================================================
# Step 02 — UMI consensus calling (script2_umi_consensus.py)
# =============================================================================
#
# Input:  {sample_id}_{sample_name}_combined_trimmed.fastq.gz (from step 01)
# Output: per-sample consensus and singleton FASTQs
#
# Output files per sample (in 02_umi_consensus/):
#   {sample_id}_{sample_name}_consensus.fastq.gz    — multi-read UMI consensus
#   {sample_id}_{sample_name}_singletons.fastq.gz   — single-read UMIs
#   {sample_id}_{sample_name}_umi_summary.txt        — human-readable stats
#   {sample_id}_{sample_name}_consensus_qc.tsv       — per-UMI QC metrics
#
step02_umi_consensus:
  input_dir:   "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/01_preprocessed"
  output_dir:  "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/02_umi_consensus"
  logs_dir:    "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK/02_umi_consensus"

  # Library layout: [spacer (0–3 nt)] [UMI (12 nt)] [anchor] [insert]
  umi_length:       12
  anchor_sequence:  "ACATGACGTCTCCCTCAGTC"   # binding region of primer
  max_mismatches:   1
  spacer_min:       0
  spacer_max:       3

  # Consensus calling
  min_reads_per_umi:             2      # UMIs with fewer reads become singletons
  posterior_min_log_delta:       2.0    # ambiguous bases called N below this threshold
  consensus_placeholder_qual_char: "I" # synthetic quality for consensus reads
  write_readcount_in_header:     true   # adds |n=<count> to FASTQ header

  # Suffix of the combined FASTQ produced by step 01
  combined_suffix: "_combined_trimmed.fastq.gz"


# =============================================================================
# Step 02a — Singleton rescue (Script2a_singleton_rescue.py)
# =============================================================================
#
# Input:  {sample_id}_{sample_name}_singletons.fastq.gz (from step 02)
# Output: filtered singleton FASTQs and variant tables
#
# Output files per sample (in 02_umi_consensus/):
#   {sample_id}_{sample_name}_singletons_rescued.fastq.gz
#   {sample_id}_{sample_name}_singleton_variants_{min_umis}umis.tsv
# Run-level output:
#   singleton_rescue_summary.tsv
#
step02a_singleton_rescue:
  singleton_dir:  "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/02_umi_consensus"
  output_dir:     "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/02_umi_consensus"
  logs_dir:       "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK/02a_singleton_rescue"

  wt_anchor:        "CCTGGTGCCCGGCCCGAA"   # anchor used to locate variable region
  var_len:          33                      # variable region length in nt
  min_umis:         3                       # minimum distinct UMIs required to keep a variant
  singleton_suffix: "_singletons.fastq.gz"


# =============================================================================
# Step 03 — Library filtering and extraction (script3_library_filtering_and_extraction.py)
# =============================================================================
#
# Input:  consensus + rescued-singleton FASTQs (from steps 02 / 02a)
# Output: filtered PASS/FAIL FASTQs and amino-acid translation tables
#
# Output files per sample (in 03_extracted/):
#   {sample_id}_{sample_name}.filtered.PASS.fastq.gz
#   {sample_id}_{sample_name}.filtered.FAIL.fastq.gz   (if write_fail_fastq: true)
#   {sample_id}_{sample_name}.filtered.PASS.aa.tsv
#   {sample_id}_{sample_name}.filtered.summary.tsv
#
step03_extraction:
  input_dir:   "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/02_umi_consensus"
  output_dir:  "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/03_extracted"
  logs_dir:    "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK/03_extraction"

  # Note: script3 uses 'samples_tsv' (not 'sample_sheet') as the key name.
  samples_tsv: "/cluster/project/reddy/katja/NGS_pipeline/scripts/P3408_LUCA-TCRA3-3xNNK_samples.tsv"

  # Anchor for variable-region extraction
  anchor_sequence:       "CCTGGTGCCCGGCCCGAA"
  anchor_max_mismatches: 0
  region_length_nt:      33

  # Output control
  drop_if_contains_N: true
  write_fail_fastq:   true
  write_aa_tsv:       true

  # Library validation mode: "combinatorial" or "3xNNK"
  library_mode: "combinatorial"

  # --- Combinatorial mode (design-orientation codons) ---
  degenerate_codons:
    - "SCN"
    - "RGY"
    - "RGY"
    - "VNB"
    - "ARY"
    - "VNB"
    - "GYN"
    - "RRY"
    - "GRR"
    - "CWR"
    - "TWY"

  # --- 3xNNK mode (only used if library_mode: 3xNNK) ---
  WT_nt_33:          "ACTGACTGACTGACTGACTGACTGACTGACTGA"  # exact 33 nt WT template
  max_mutated_codons: 3

  # Input file suffixes (set "" to skip that file type)
  input_suffixes_consensus:  "_consensus.fastq.gz"
  input_suffixes_singletons: "_singletons_rescued.fastq.gz"


# =============================================================================
# Step 04 — Variant labeling and enrichment (script4_variant_labeling.py)
# =============================================================================
#
# Input:  *.filtered.PASS.aa.tsv files (from step 03)
# Output: per-peptide variant tables with enrichment scores and specificity labels
#
# Output files (in 04_variant_labeling/):
#   {peptide_key}.variant_labeling.csv    — enrichment + specificity per variant
#   variant_labeling_summary.csv          — run-level summary across all peptides
#
step04_variant_labeling:
  input_dir:   "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/03_extracted"
  output_dir:  "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3-3xNNK/04_variant_labeling"
  logs_dir:    "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3-3xNNK/04_variant_labeling"

  input_glob: "*.filtered.PASS.aa.tsv"
  aa_column:  "aa_seq"

  # Token prefix in filenames used to parse conditions.
  # Filenames are expected to match: _{file_token_prefix}{condition_suffix}.filtered.PASS.aa.tsv
  # Example: GFB-61826_DMF5CDR3b2xnegative.filtered.PASS.aa.tsv  -> prefix = "DMF5CDR3b"
  file_token_prefix: "DMF5CDR3b"

  # Condition suffixes parsed from the token after file_token_prefix
  lib_suffix:   "originallib"
  neg_suffix:   "2xnegative"
  pos3x_suffix: "3xpositive"
  pos1x_suffix: "31xpositive"

  # Peptides missing any of these conditions are skipped
  required_conditions:
    - neg
    - pos3x
    - pos1x

  # Enrichment calculation
  pseudocount:  1.0e-9   # added to frequencies to avoid division by zero
  status_up:    2.0      # fold-change >= status_up  -> "Enriched"
  status_down:  0.5      # fold-change <= status_down -> "Depleted"
