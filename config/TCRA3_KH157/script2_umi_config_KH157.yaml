# Paths where trimmed + combined FASTQs live (input for UMI/consensus steps)
input_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3569_LUCA-TCRA3_KH157/01_preprocessed/11_05_2026_minLenght191_QScore30"
sample_sheet: "/cluster/project/reddy/katja/NGS_pipeline/data/P3569_LUCA-TCRA3_KH157/P3569_LUCA-TCRA3_KH157_samples.tsv"
output_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3569_LUCA-TCRA3_KH157/02_umi/11_05_2026_KH157"
logs_dir: "/cluster/project/reddy/katja/NGS_pipeline/logs/P3569_LUCA-TCRA3_KH157/11_05_2026_KH157"

# UMI extraction / matching
umi_length: 12
anchor_sequence: "ACATGACGTCTCCCTCAGTC" #In or case:binding region of primer
max_mismatches: 1

# Consensus calling defaults
min_reads_per_umi: 2

# Disk-backed UMI bucketing for bounded memory usage.
# Higher values reduce peak RAM at the cost of more temp files and IO.
umi_bucket_count: 256

# Suffix produced by the previous step (trim + combine)
combined_suffix: "_combined_trimmed.fastq.gz"

# Whether to add "|n=<count>" to FASTQ header (default: True)
write_readcount_in_header: true

# Library layout: allowed spacer range (default: 0–3)
spacer_min: 0
spacer_max: 3

# Posterior consensus threshold (default: 2.0)
posterior_min_log_delta: 2.0

# Placeholder quality character for consensus FASTQ (default: "I")
consensus_placeholder_qual_char: "I"