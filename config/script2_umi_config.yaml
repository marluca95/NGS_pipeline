# Paths where trimmed + combined FASTQs live (input for UMI/consensus steps)
output_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3408_LUCA-TCRA3/processed"
sample_sheet: "/cluster/project/reddy/katja/NGS_pipeline/scripts/samples.tsv"
logs_dir: "/cluster/project/reddy/katja/NGS_pipeline/logs/P3408_LUCA-TCRA3"

# UMI extraction / matching
umi_length: 12
anchor_sequence: "ACATGACGTCTCCCTCAGTC"
max_mismatches: 1

# Consensus calling defaults (sensible, optional)
min_reads_per_umi: 2
soft_top_k: 1
soft_cumulative_frac: 0.9
soft_min_count: 2

# Suffix produced by the previous step (trim + combine)
combined_suffix: "_combined_trimmed.fastq.gz"
