# Paths where trimmed + combined FASTQs live (input for UMI/consensus steps)
input_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3481_LUCA-TCRDMF5/preprocessed/18_02_2026_minLenght110_QScore20"
sample_sheet: "/cluster/project/reddy/katja/NGS_pipeline/scripts/P3481_LUCA-TCRDMF5_samples.tsv"
output_dir: "/cluster/project/reddy/katja/NGS_pipeline/data/P3481_LUCA-TCRDMF5/umi3"
logs_dir: "/cluster/project/reddy/katja/NGS_pipeline/logs/P3481_LUCA-TCRDMF5/umi3"

# UMI extraction / matching
umi_length: 12
anchor_sequence: "CACCCCTCC" #In or case:binding region of primer
max_mismatches: 2

# Consensus calling defaults
min_reads_per_umi: 2

# Suffix produced by the previous step (trim + combine)
combined_suffix: "_combined_trimmed.fastq.gz"

# Whether to add "|n=<count>" to FASTQ header (default: True)
write_readcount_in_header: true

# Library layout: allowed spacer range (default: 0–3)
spacer_min: 0
spacer_max: 3

# Posterior consensus threshold (default: 2.0)
posterior_min_log_delta: 2.0

# Placeholder quality character for consensus FASTQ (default: "I")
consensus_placeholder_qual_char: "I"